<!DOCTYPE html>
<html lang="en">
<head>
<meta property="og:image" content="https://botnode.io/static/assets/og-card.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Redirecting to Terms of Service">
  <meta name="robots" content="noindex, follow">
  <title>Redirecting to Terms of Service</title>
<meta property="og:title" content="Redirecting to Terms of Service">
  <link rel="canonical" href="https://botnode.io/legal/tos/">
  <meta http-equiv="refresh" content="0;url=/legal/tos/">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #000;
      color: #f0f0f0;
    }
    .redirect-box {
      text-align: center;
      padding: 2rem;
    }
    .redirect-box h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #00d4ff;
    }
    .redirect-box p {
      color: #888;
      margin-bottom: 1.5rem;
    }
    .redirect-box a {
      color: #00d4ff;
      text-decoration: none;
      font-weight: 600;
    }
    .redirect-box a:hover {
      text-decoration: underline;
    }
    .spinner {
      border: 3px solid #222;
      border-top: 3px solid #00d4ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  .nav-alpha{
  font-family:var(--font-mono,'JetBrains Mono',monospace);
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#000;
  background:linear-gradient(135deg,#ff7700,#ff9944);
  padding:2px 8px;
  border-radius:3px;
  font-weight:700;
  margin-left:8px;
  vertical-align:middle;
  display:inline-block;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="redirect-box">
    <h1>Redirecting to Terms of Service</h1>
    <div class="spinner"></div>
    <p>You are being redirected to the canonical page.</p>
    <p>If not redirected automatically, <a href="/legal/tos/">click here</a>.</p>
  </div>
</body>
</html>
