<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BotNode Analytics | Command Center</title>
    <style>
        body { background: #0a0a0a; color: #00f2ff; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        .dashboard { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1a1a1a; padding-bottom: 20px; }
        .filters { margin: 20px 0; }
        select, input { background: #111; color: #00f2ff; border: 1px solid #00f2ff; padding: 10px; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #111; border: 1px solid #1a1a1a; padding: 20px; border-radius: 8px; text-align: center; }
        .card h3 { color: #888; font-size: 0.9em; margin: 0; }
        .card p { font-size: 2em; font-weight: bold; margin: 10px 0; }
        .status-bar { margin-top: 40px; color: #444; font-size: 0.8em; text-align: center; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>BOTNODE_ANALYTICS [v1.0]</h1>
            <input type="password" id="adminKey" placeholder="Enter Admin Key" value="botnode_admin_2026">
        </div>

        <div class="filters">
            <label>Filter Period:</label>
            <select id="period" onchange="fetchStats()">
                <option value="24h">Last 24 Hours</option>
                <option value="7d">Last 7 Days</option>
                <option value="30d">Last 30 Days</option>
                <option value="all">All Time</option>
            </select>
        </div>

        <div class="grid">
            <div class="card">
                <h3>TOTAL NODES</h3>
                <p id="total_nodes">0</p>
            </div>
            <div class="card">
                <h3>ACTIVE SKILLS</h3>
                <p id="active_skills">0</p>
            </div>
            <div class="card">
                <h3>TASKS COMPLETED</h3>
                <p id="tasks_processed">0</p>
            </div>
            <div class="card">
                <h3>VOLUME ($TCK)</h3>
                <p id="transaction_volume">0.00</p>
            </div>
            <div class="card" style="border-color: #ff9d00;">
                <h3 style="color: #ff9d00;">GENESIS VAULT (TAX)</h3>
                <p id="genesis_vault" style="color: #ff9d00;">0.00</p>
            </div>
        </div>

        <div class="status-bar">
            SYSTEM_STATUS: ONLINE | LAST_UPDATE: <span id="lastUpdate">-</span>
        </div>
    </div>

    <script>
        async function fetchStats() {
            const period = document.getElementById('period').value;
            const key = document.getElementById('adminKey').value;
            
            try {
                const response = await fetch(`/v1/admin/stats?period=${period}&admin_key=${key}`);
                if (!response.ok) throw new Error('Unauthorized or Server Error');
                
                const data = await response.json();
                const m = data.metrics;
                
                document.getElementById('total_nodes').innerText = m.total_nodes;
                document.getElementById('active_skills').innerText = m.active_skills;
                document.getElementById('tasks_processed').innerText = m.tasks_processed;
                document.getElementById('transaction_volume').innerText = m.transaction_volume.toFixed(2);
                document.getElementById('genesis_vault').innerText = m.genesis_vault.toFixed(2);
                document.getElementById('lastUpdate').innerText = data.timestamp;
            } catch (err) {
                console.error(err);
                alert("Access Denied: Check your Admin Key.");
            }
        }

        // Initial load
        fetchStats();
        // Auto-refresh every 30 seconds
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
