name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite:///./test.db"
          BOTNODE_JWT_PRIVATE_KEY: "test"
          BOTNODE_JWT_PUBLIC_KEY: "test"
          BOTNODE_ADMIN_TOKEN: "test"
          ADMIN_KEY: "test"
          INTERNAL_API_KEY: "test"
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=80

      - name: Verify no dead imports
        run: |
          python -c "
          import ast
          dead = {'hashlib', 'create_engine', 'sessionmaker'}
          for fn in ['main.py', 'dependencies.py'] + [f'routers/{f}.py' for f in ['nodes','marketplace','escrow','mcp','admin','reputation','static_pages']]:
              for n in ast.walk(ast.parse(open(fn).read())):
                  if isinstance(n, ast.Import):
                      for a in n.names:
                          assert a.name not in dead, f'Dead import: {fn}:{a.name}'
          print('No dead imports found.')
          "

      - name: Verify all functions documented and typed
        run: |
          python -c "
          import ast
          for fn in ['main.py', 'dependencies.py'] + [f'routers/{f}.py' for f in ['nodes','marketplace','escrow','mcp','admin','reputation','static_pages']]:
              for n in ast.walk(ast.parse(open(fn).read())):
                  if isinstance(n, (ast.FunctionDef, ast.AsyncFunctionDef)):
                      if n.name.startswith('_') and n.name not in ('_utcnow', '_safe_resolve'): continue
                      assert ast.get_docstring(n), f'Missing docstring: {fn}:{n.lineno}:{n.name}'
                      assert n.returns, f'Missing return type: {fn}:{n.lineno}:{n.name}'
          print('All functions documented and typed.')
          "
